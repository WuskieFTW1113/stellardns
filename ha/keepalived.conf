# StellarDNS HA — keepalived config
# Deploy StellarDNS identically on TWO LXCs (e.g. 192.168.9.10 and 192.168.9.11),
# install keepalived on both (apt install keepalived), drop this at
# /etc/keepalived/keepalived.conf on each, and point DHCP's DNS at the VIP.
#
# NODE A (primary): use as-is.  NODE B: change state to BACKUP and priority to 100.

vrrp_script chk_stellardns {
    script "/usr/bin/dig @127.0.0.1 +time=1 +tries=1 health.check.local > /dev/null 2>&1 || /usr/bin/dig @127.0.0.1 +time=1 +tries=1 example.com > /dev/null 2>&1"
    interval 3
    fall 2
    rise 2
}

vrrp_instance STELLARDNS {
    state MASTER            # BACKUP on node B
    interface eth0
    virtual_router_id 53
    priority 150            # 100 on node B
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass ChangeMe53
    }
    virtual_ipaddress {
        192.168.9.53/24     # <— the VIP clients use as their DNS server
    }
    track_script {
        chk_stellardns
    }
}
